<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Cut - Corte Oficial</title>

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #ffffff;
  color: #111111;
  line-height: 1.5;
}

/* ===== TOP BAR ===== */
.top-bar {
  background: #000;
  color: #fff;
  text-align: center;
  padding: 8px;
  font-size: 13px;
  letter-spacing: 1px;
}

/* ===== CONTAINER ===== */
.container {
  width: 90%;
  max-width: 1200px;
  margin: auto;
}

/* ===== HERO ===== */
.hero {
  display: flex;
  flex-direction: column;
  gap: 30px;
  padding: 40px 0;
}

/* ===== CAROUSEL ===== */
.hero-image {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 5;
  overflow: hidden;
  border-radius: 12px;
}

.carousel-track {
  display: flex;
  height: 100%;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
}

.carousel-track::-webkit-scrollbar {
  display: none;
}

.carousel-slide {
  flex: 0 0 100%;
  height: 100%;
  scroll-snap-align: start;
}

.carousel-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== ARROWS (DESKTOP ONLY) ===== */
.carousel-btn {
  display: none;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  z-index: 10;
}

.carousel-btn.prev { left: 10px; }
.carousel-btn.next { right: 10px; }

/* ===== DOTS ===== */
.carousel-dots {
  position: absolute;
  bottom: 12px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 8px;
}

.carousel-dots span {
  width: 8px;
  height: 8px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  cursor: pointer;
  transition: 0.2s;
}

.carousel-dots span.active {
  background: #fff;
}

/* ===== CONTENT ===== */
.hero-content h1 {
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 10px;
  letter-spacing: -0.5px;
}

.price {
  font-size: 26px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 20px;
}

.description {
  color: #555;
  margin-bottom: 25px;
  font-size: 15px;
}

/* ===== SIZE SELECTOR ===== */
.size-selector {
  margin-bottom: 25px;
}

.size-label {
  font-size: 13px;
  margin-bottom: 10px;
  display: block;
  letter-spacing: 1px;
}

.size-options {
  display: flex;
  gap: 10px;
}

.size-options input {
  display: none;
}

.size-options label {
  width: 45px;
  height: 45px;
  border: 1px solid #ccc;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s ease;
}

.size-options input:checked + label {
  background: #000;
  color: #fff;
  border-color: #000;
}

/* ===== CTA BUTTON ===== */
.cta-button {
  display: block;
  width: 100%;
  text-align: center;
  background: #000;
  color: #fff;
  padding: 16px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 700;
  letter-spacing: 1px;
  transition: all 0.3s ease;
}

.cta-button:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

/* ===== TRUST LINE ===== */
.trust-line {
  margin-top: 12px;
  font-size: 13px;
  color: #666;
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
}

/* ===== BENEFITS ===== */
.benefits {
  margin-top: 70px;
}

.benefits h2 {
  text-align: center;
  margin-bottom: 30px;
}

.benefit-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.benefit-item {
  display: flex;
  align-items: center;
  gap: 15px;
  background: #f7f7f7;
  padding: 18px;
  border-radius: 12px;
}

.benefit-icon {
  font-size: 18px;
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 40px 0;
  font-size: 13px;
  color: #777;
}

/* ===== DESKTOP ===== */
@media (min-width: 768px) {
  .hero {
    flex-direction: row;
    align-items: center;
  }

  .hero-image, .hero-content {
    flex: 1;
  }

  .hero-content {
    padding-left: 60px;
  }

  .benefit-list {
    flex-direction: row;
  }

  .benefit-item {
    flex: 1;
  }

  .carousel-btn {
    display: block;
  }

  .carousel-track {
    overflow-x: hidden;
  }
}

</style>
</head>

<body>

<div class="top-bar">
ENVÍO GRATIS HOY • REGIÓN METROPOLITANA
</div>

<div class="container">

<section class="hero">

  <div class="hero-image">

    <button class="carousel-btn prev">&#10094;</button>
    <button class="carousel-btn next">&#10095;</button>

    <div class="carousel-track" id="carousel">
      <div class="carousel-slide"><img src="Polera Blanca Frontal.jpg" alt="Producto 1"></div>
      <div class="carousel-slide"><img src="Polera Blanca Posterior.png" alt="Producto 2"></div>
      <div class="carousel-slide"><img src="Polera Negra Frontal.jpg" alt="Producto 3"></div>
      <div class="carousel-slide"><img src="Polera Negra Posterior.png" alt="Producto 4"></div>
    </div>

    <div class="carousel-dots" id="dots">
      <span class="active"></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

  <div class="hero-content">
    <h1>Polera Basica Estilo Slim Fit</h1>
    <p class="price">$39.990</p>

    <p class="description">
      Diseño minimalista, tela premium y corte oversize auténtico.
      Edición limitada para quienes marcan tendencia.
    </p>

    <div class="size-selector">
      <span class="size-label">TALLA</span>
      <div class="size-options">
        <input type="radio" id="size-s" name="size">
        <label for="size-s">S</label>
        <input type="radio" id="size-m" name="size" checked>
        <label for="size-m">M</label>
        <input type="radio" id="size-l" name="size">
        <label for="size-l">L</label>
        <input type="radio" id="size-xl" name="size">
        <label for="size-xl">XL</label>
      </div>
    </div>

    <a href="#" class="cta-button">COMPRAR AHORA</a>

    <div class="trust-line">
      <span>🔒 Pago Seguro</span>
      <span>📦 Envío a todo Chile</span>
    </div>

  </div>

</section>

</div>

<footer>
© 2026 Star Cut Drops — Todos los derechos reservados
</footer>

<script>
const track = document.getElementById('carousel');
const dots = document.querySelectorAll('#dots span');
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');

let index = 0;
const total = track.children.length; // 🔥 Ahora es dinámico

function updateCarousel(i) {
  index = i;

  track.scrollTo({
    left: track.offsetWidth * index,
    behavior: 'smooth'
  });

  dots.forEach(dot => dot.classList.remove('active'));
  if (dots[index]) {
    dots[index].classList.add('active');
  }
}

// 👉 Botón siguiente (con loop automático)
nextBtn.addEventListener('click', () => {
  index = (index + 1) % total;
  updateCarousel(index);
});

// 👉 Botón anterior (loop inverso)
prevBtn.addEventListener('click', () => {
  index = (index - 1 + total) % total;
  updateCarousel(index);
});

// 👉 Click en dots
dots.forEach((dot, i) => {
  dot.addEventListener('click', () => {
    updateCarousel(i);
  });
});

// 👉 Detectar swipe / scroll manual (móvil incluido)
track.addEventListener('scroll', () => {
  const slideIndex = Math.round(track.scrollLeft / track.offsetWidth);

  if (slideIndex !== index) {
    index = slideIndex;
    dots.forEach(dot => dot.classList.remove('active'));
    if (dots[index]) {
      dots[index].classList.add('active');
    }
  }
});

// 👉 Ajustar posición si cambia tamaño de pantalla
window.addEventListener('resize', () => {
  updateCarousel(index);
});
</script>

</body>
</html>
