<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Página</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f4f4f4;
  color: #333;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

header {
  text-align: center;
  padding: 40px 20px;
  background: #111;
  color: white;
}

h1 {
  margin-bottom: 10px;
}

section {
  background: white;
  margin-top: 20px;
  padding: 20px;
  border-radius: 8px;
}

footer {
  text-align: center;
  margin-top: 40px;
  padding: 20px;
  font-size: 14px;
  color: #666;
}

/* Responsive */
@media (max-width: 600px) {
  header {
    padding: 30px 10px;
  }
  h1 {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Mi Página Estática</h1>
  <p>Una web simple, rápida y adaptable</p>
</header>

<div class="container">

  <section>
    <h2>Sobre mí</h2>
    <p>
      Aquí puedes escribir una descripción breve. 
      Esta página es completamente estática y se adapta automáticamente a celulares.
    </p>
  </section>

  <section>
    <h2>Contacto</h2>
    <p>Email: contacto@ejemplo.com</p>
  </section>

</div>

<footer>
  © 2026 - Todos los derechos reservados
</footer>

</body>
</html>
